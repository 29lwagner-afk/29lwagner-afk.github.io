<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>new game</title>
    <style>
        #startButton{
            position: absolute;
            top: 100px;
            left: 100px;
        }
    </style>
</head>
<body>
    <button id="startButton"onMouseover="moveButton()">click here to start the game</button>

</body>
<script>
    function moveButton(){
        var button=document.getElementById("startButton");
var width=window.innerWidth;
var height=window.innerHeight;
//get random pos
width=Math.ramdom() * width;
height=Math.ramdom() * height;

button.style.left = width + "px";
button.style.top = height + "px";



}
</script>
</html>
